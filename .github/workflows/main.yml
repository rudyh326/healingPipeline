name: ReactYarn CI

on:
  push:
    branches: [ "master" ]
    
jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
    - run: |
        cd "C:\Program Files\FYP_Test\SeleniumHeal_SPA"
        mvn -B package --file pom.xml


